<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="青空文庫の作品を縦書きで読めるPWAアプリ" />
    <meta name="theme-color" content="#2a1800" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>文庫びより</title>
    <style>
      /* ルビ: ブラウザのネイティブrubyレンダリングをバイパスして絶対配置 */
      /* writing-mode:vertical-rl では physical right = block-start = ふりがなの位置 */
      ruby { display: inline-block; position: relative; }
      rt   { display: block; position: absolute;
             right: -0.6em; top: 0;
             font-size: 0.5em; line-height: 1; white-space: nowrap; }
      rp   { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
